<!DOCTYPE html>
<html>

<head>
<title>Apna Shehar</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

h1{
color:#333;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:darkblue;
}

#result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Apna Shehar</h1>

<p>Apne city ke log kaha kaha hain</p>

<h2>Apna Data Add karo</h2>

<input type="text" id="name" placeholder="Apna naam">

<br>

<input type="text" id="city" placeholder="Apna city">

<br>

<button onclick="addUser()">Add</button>

<h2>City Search karo</h2>

<input type="text" id="searchCity" placeholder="City name">

<br>

<button onclick="searchCity()">Search</button>

<div id="result"></div>

<script>

let users=[];

function addUser(){

let name=document.getElementById("name").value;
let city=document.getElementById("city").value;

users.push({name:name,city:city});

alert("Data add ho gaya");

}

function searchCity(){

let search=document.getElementById("searchCity").value;

let result="";

for(let i=0;i<users.length;i++){

if(users[i].city==search){

result+=users[i].name+"<br>";

}

}

document.getElementById("result").innerHTML=result;

}

</script>

</body>

</html>
